services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: crm_root_pass
      MYSQL_DATABASE: student_crm
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pcrm_root_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    image: student-crm-backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://root:crm_root_pass@db:3306/student_crm
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    image: student-crm-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
